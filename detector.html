<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: transparent; }
        #avatar { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <img id="avatar" src="idle.png">
    <script>
        const avatar = document.getElementById('avatar');
        const idle = 'idle.png';
        const talking = 'talking.png';
        let isTalking = false;

        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                const ctx = new AudioContext();
                const source = ctx.createMediaStreamSource(stream);
                const analyser = ctx.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);

                const data = new Uint8Array(analyser.frequencyBinCount);
                const threshold = 30;

                setInterval(() => {
                    analyser.getByteFrequencyData(data);
                    const avg = data.reduce((a, b) => a + b) / data.length;
                    const nowTalking = avg > threshold;

                    if (nowTalking !== isTalking) {
                        isTalking = nowTalking;
                        avatar.src = isTalking ? talking : idle;
                    }
                }, 50);
            });
    </script>
</body>
</html>
